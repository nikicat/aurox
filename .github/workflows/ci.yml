name: CI

on:
  push:
    branches: ['**']
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  ci:
    name: fmt + taplo + clippy + build + test
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install system dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel git pkgconf pacman rustup taplo-cli
          # rust-toolchain.toml drives channel + components on first cargo call.

      - uses: actions/checkout@v6

      - name: Cache cargo registry and target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: taplo fmt
        run: taplo fmt --check

      - name: taplo lint
        run: taplo lint

      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: build
        run: cargo build --all-targets --locked

      - name: test
        run: cargo test --all-features --locked

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    # Runs in parallel to the main `ci` job. Uses stock GitHub runner rather
    # than the Arch container so cargo-llvm-cov's prebuilt-binary install
    # action works without extra glibc plumbing.
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache cargo registry and target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-coverage-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-coverage-

      - name: Collect coverage (lcov)
        # Regex matches the one in justfile's `ignore_regex`: strip CLI glue
        # (src/main.rs), the shared testing module, and example binaries.
        run: |
          cargo llvm-cov --all-features --locked \
            --ignore-filename-regex '(examples/|src/main\.rs|src/testing\.rs)' \
            --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          fail_ci_if_error: false
          # Public repo: no token needed — codecov-action authenticates via
          # GitHub OIDC. If the repo ever goes private, add
          # `token: ${{ secrets.CODECOV_TOKEN }}` here.
          use_oidc: true
